<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GiftOS" />
  <meta name="description" content="Personal gift selection system" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg" />
  <title>GiftOS · Personal Edition</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>

  <main class="device" id="app" aria-live="polite">
    <div class="dynamic-island"></div>
    <div class="statusbar">
      <span id="clock">22:06</span>
      <span>GiftOS</span>
      <span>100%</span>
    </div>
    <section class="view" id="view"></section>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
